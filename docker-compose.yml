version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: smart-food-app
    container_name: smart-food-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - smart-food-network
    depends_on:
      - db
      - redis

  webserver:
    image: nginx:alpine
    container_name: smart-food-webserver
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - smart-food-network

  db:
    image: mysql:8.0
    container_name: smart-food-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-smart_food}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-smart_food_user}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - smart-food-network

  redis:
    image: redis:alpine
    container_name: smart-food-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - smart-food-network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-food-queue
    restart: unless-stopped
    command: php artisan queue:work --tries=3
    volumes:
      - ./:/var/www/html
    networks:
      - smart-food-network
    depends_on:
      - db
      - redis

networks:
  smart-food-network:
    driver: bridge

volumes:
  dbdata:
  redisdata:
